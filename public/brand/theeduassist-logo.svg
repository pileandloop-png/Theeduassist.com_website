<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <circle cx="250" cy="250" r="240" fill="#77BA55" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="250" cy="250" r="160" fill="#27496D" stroke="#FFFFFF" stroke-width="4"/>

  <!-- Top Curve Text -->
  <path id="top-curve" d="M 80,250 A 170,170 0 0,1 420,250" fill="none" />
  <text fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="34" letter-spacing="4">
    <textPath href="#top-curve" startOffset="50%" text-anchor="middle">THEEDUASSIST</textPath>
  </text>

  <!-- Bottom Curve Text -->
  <path id="bottom-curve" d="M 420,250 A 170,170 0 0,0 80,250" fill="none" />
  <text fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="20" letter-spacing="2">
    <textPath href="#bottom-curve" startOffset="50%" text-anchor="middle">E-LEARNING DESIGN AGENCY</textPath>
  </text>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <polygon points="40,235 45,245 55,245 47,252 50,262 40,256 30,262 33,252 25,245 35,245" />
    <polygon points="460,235 465,245 475,245 467,252 470,262 460,256 450,262 453,252 445,245 455,245" />
  </g>

  <!-- Inner Icons -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Network Nodes -->
    <path d="M 250,150 L 250,130 M 215,140 L 250,150 L 285,140" />
    <circle cx="250" cy="130" r="5" fill="#FFFFFF"/>
    <circle cx="215" cy="140" r="5" fill="#FFFFFF"/>
    <circle cx="285" cy="140" r="5" fill="#FFFFFF"/>

    <!-- Central dotted line -->
    <line x1="250" y1="180" x2="250" y2="150" stroke-dasharray="4,4" />
    <circle cx="250" cy="150" r="4" fill="#FFFFFF"/>

    <!-- Wi-Fi -->
    <path d="M 235,170 A 20,20 0 0,1 265,170 M 242,180 A 10,10 0 0,1 258,180" />
    <circle cx="250" cy="188" r="2" fill="#FFFFFF" stroke="none"/>

    <!-- Desktop monitor -->
    <rect x="205" y="195" width="90" height="60" rx="4" />
    <line x1="205" y1="240" x2="295" y2="240" />
    <path d="M 235,255 L 265,255 L 255,270 L 245,270 Z" fill="#FFFFFF"/>

    <!-- Graduation cap -->
    <path d="M 250,205 L 225,215 L 250,225 L 275,215 Z" fill="#FFFFFF" stroke="none"/>
    <path d="M 235,220 L 235,230 A 15,7 0 0,0 265,230 L 265,220" />
    <line x1="275" y1="215" x2="275" y2="230" stroke-width="2"/>

    <!-- Open book -->
    <path d="M 250,310 L 250,285 M 250,310 Q 225,320 200,300 L 200,275 Q 225,295 250,285 Q 275,295 300,275 L 300,300 Q 275,320 250,310 Z" />
  </g>
</svg>