name: Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x' # use the version compatible with the project

    - name: Install dependencies
      run: npm install

    - name: Build Astro site
      run: npm run build

    - name: Validate redirects
      run: npm run validate:redirects --if-present

    - name: Run checks
      run: npm run check --if-present
